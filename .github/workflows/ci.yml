name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: huoshan-env
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # 启用 Git LFS 下载
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      # 使用自定义的 Composite Action 初始化火山引擎 CLI
      - name: Initialize Volcano Engine CLI
        uses: ./.github/actions/init-huoshan   # 注意路径相对于仓库根目录
        with:
          access_key: ${{ secrets.VOLC_ACCESS_KEY }}
          secret_key: ${{ secrets.VOLC_SECRET_KEY }}
          region: ${{ secrets.REGION }}
          http_proxy: ${{ secrets.HTTP_PROXY }}
          https_proxy: ${{ secrets.HTTPS_PROXY }}


      # 示例：执行构建任务（此时 volc 命令已可用）
      - name: Build with volc
        run: |
          echo "🔨 Running build..."
          volc version
          task_name=kairos-ci-$GITHUB_SHA

          volc ml_task submit --conf .github/commons/new-huoshan-mltask.yaml --task_name $task_name
          # 在这里添加你的构建/测试命令，例如：
          # volc ecs describe-instances ...

  test:
    runs-on: ubuntu-latest
    environment: huoshan-env
    needs: build  # 可选，示例中无依赖
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/init-huoshan
        with:
          access_key: ${{ secrets.VOLC_ACCESS_KEY }}
          secret_key: ${{ secrets.VOLC_SECRET_KEY }}
          region: ${{ secrets.REGION }}
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          # 你的测试命令

  deploy:
    runs-on: ubuntu-latest
    environment: huoshan-env
    needs: [build, test]
    if: github.ref == 'refs/heads/main'  # 仅 main 分支部署
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/init-huoshan
        with:
          access_key: ${{ secrets.VOLC_ACCESS_KEY }}
          secret_key: ${{ secrets.VOLC_SECRET_KEY }}
          region: ${{ secrets.REGION }}
      - name: Deploy
        run: |
          echo "🚀 Deploying..."
          # 你的部署命令
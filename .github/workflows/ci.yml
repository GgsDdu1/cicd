name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_A800:
    runs-on: ubuntu-latest
    environment: huoshan-env
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # 启用 Git LFS 下载
      # 安装yq工具
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      # 初始化火山引擎 CLI以及更新任务配置
      - name: Initialize volc CLI
        uses: ./.github/actions/init-huoshan
        with:
          access_key: ${{ secrets.VOLC_ACCESS_KEY }}
          secret_key: ${{ secrets.VOLC_SECRET_KEY }}
          region: ${{ secrets.REGION }}
      # 更新任务配置
      - name: Update huoshan config.yaml
        shell: bash
        env:
          HTTPS_PROXY: ${{ secrets.https_proxy }}
          HTTP_PROXY: ${{ secrets.http_proxy }}
          HUOSHAN_TASK_CONFIG: ".github/commons/huoshan-mltask.yaml"
        run: |
          set -e
          echo "🔧 Configuring huoshan config.yaml..."
          python .github/commons/scripts/update_huoshan_yaml.py \
          --yaml-file .github/commons/huoshan-mltask-template.yaml \
          --cmd-file .github/commons/scripts/huoshan_cmd.sh \
          --http-proxy "${HTTP_PROXY}" \
          --https-proxy "${HTTPS_PROXY}" \
          --commit-id "${GITHUB_SHA}" \
          --output-file "${HUOSHAN_TASK_CONFIG}"
          # 传递变量给后面的step
          echo "HUOSHAN_TASK_CONFIG=${HUOSHAN_TASK_CONFIG}" >> $GITHUB_ENV
      # 执行测试任务
      - name: Run tests in huoshanyun
        run: |
          set -e
          # 1. 提交任务
          TASK_NAME=kairos-ci-$GITHUB_SHA
          output=$(volc ml_task submit --conf ${HUOSHAN_TASK_CONFIG} --task_name "$TASK_NAME" --output json)
          TASK_ID=$(echo "$output" | jq -r '.Id')
          if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "null" ]; then
             echo "Failed to get task ID from submit output: $output"
            exit 1
          fi
          echo "Task ID: $TASK_ID"

          # 2. 在后台启动日志流，实时输出
          echo "Starting log streaming..."
          volc ml_task logs -f --task "$TASK_ID" -i worker-0

          # 3.检查任务状态
          STATUS=$(volc ml_task get --id $TASK_ID --output json | jq -r '.[0].Status')
          if [ "$STATUS" = "Success" ]; then
            echo "✅ Task succeeded!"
            exit 0
          else
            echo "❌ Task Failed! status:$STATUS"
          fi
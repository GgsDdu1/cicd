name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: huoshan-env
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # 启用 Git LFS 下载
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      # 使用自定义的 Composite Action 初始化火山引擎 CLI以及更新任务配置
      - name: Initialize Volcano Engine CLI
        uses: ./.github/actions/init-huoshan   # 注意路径相对于仓库根目录
        with:
          access_key: ${{ secrets.VOLC_ACCESS_KEY }}
          secret_key: ${{ secrets.VOLC_SECRET_KEY }}
          region: ${{ secrets.REGION }}
          http_proxy: ${{ secrets.HTTP_PROXY }}
          https_proxy: ${{ secrets.HTTPS_PROXY }}

  test:
    runs-on: ubuntu-latest
    environment: huoshan-env
    needs: build
    steps:
    - name: Debug PATH in test
      run: |
        echo "PATH: $PATH"
        which volc || echo "volc not found"
        echo "$HOME/.volc/bin" >> $GITHUB_PATH
        cat $GITHUB_PATH  # 调试：查看是否写入成功
        if ! volc version &>/dev/null; then
          echo "❌ volc CLI installation failed."
        fi
        export PATH="$HOME/.volc/bin:$PATH"
        if ! volc version &>/dev/null; then
          echo "❌ volc CLI installation failed."
          exit 1
        fi
      - name: Run tests
        run: |
          set -e
          # 1. 提交任务
          TASK_NAME=kairos-ci-$GITHUB_SHA
          output=$(volc ml_task submit --conf .github/commons/new-huoshan-mltask.yaml --task_name "$TASK_NAME" --output json)
          TASK_ID=$(echo "$output" | jq -r '.Id')
          if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "null" ]; then
             echo "Failed to get task ID from submit output: $output"
            exit 1
          fi
          echo "Task ID: $TASK_ID"

          # 2. 在后台启动日志流，实时输出
          echo "Starting log streaming..."
          volc ml_task logs -f --task "$TASK_ID" -i worker-0

          # 3.检查任务状态
          STATUS=$(volc ml_task get --id $TASK_ID --output json | jq -r '.[0].Status')
          if [ "$STATUS" = "Success" ]; then
            echo "✅ Task succeeded!"
            exit 0
          else
            echo "❌ Task Failed! status:$STATUS"
          fi
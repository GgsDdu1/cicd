name: 'Init Volcano Engine CLI'
description: 'Install and configure volc CLI for GitHub Actions'
inputs:
  access_key:
    description: 'Volcano Engine Access Key ID'
    required: true
  secret_key:
    description: 'Volcano Engine Secret Access Key'
    required: true
  region:
    description: 'Default region (e.g., cn-shanghai)'
    required: true
    default: 'cn-shanghai'

runs:
  using: 'composite'
  steps:
    - name: Install volc CLI
      shell: bash
      run: |
        echo "🚀 Installing volc CLI..."
        # 自动同意安装（echo y）
        echo y | sh -c "$(curl -fsSL https://ml-platform-public-examples-cn-beijing.tos-cn-beijing.volces.com/cli-binary/install.sh)"
        # 将 CLI 路径永久加入 PATH（后续步骤生效）
        echo "$HOME/.volc/bin" >> $GITHUB_PATH
        echo "✅ Installation completed."

    - name: Verify installation
      shell: bash
      run: |
        # 此时 PATH 尚未包含 ~/.volc/bin，需手动指定或重新加载 PATH
        export PATH="$HOME/.volc/bin:$PATH"
        if ! volc version &>/dev/null; then
          echo "❌ volc CLI installation failed."
          exit 1
        fi
        echo "✅ volc version: $(volc version)"

    - name: Configure volc CLI
      shell: bash
      env:
        # 将 inputs 转为环境变量，避免 sed 直接处理包含特殊字符的输入
        ACCESS_KEY: ${{ inputs.access_key }}
        SECRET_KEY: ${{ inputs.secret_key }}
        REGION: ${{ inputs.region }}
      run: |
        set -e
        echo "🔧 Configuring volc CLI..."

        # 确保配置目录存在
        mkdir -p .github/config/volc ~/.volc

        # 如果 credentials 模板文件不存在，创建默认模板
        if [ ! -f .github/config/volc/credentials ]; then
          cat > .github/config/volc/credentials <<'EOF'
[default]
access_key_id     = 1234
secret_access_key = 12345
EOF
        fi

        # 如果 config 模板文件不存在，创建默认模板
        if [ ! -f .github/config/volc/config ]; then
          cat > .github/config/volc/config <<'EOF'
[default]
region       = 1234
auto_upgrade = false

[ml_platform] 
EOF
        fi

        # 替换 credentials 中的密钥
        sed -i.bak \
          -e "s/^access_key_id[[:space:]]*=.*/access_key_id     = ${ACCESS_KEY}/" \
          -e "s/^secret_access_key[[:space:]]*=.*/secret_access_key = ${SECRET_KEY}/" \
          .github/config/volc/credentials

        # 替换 config 中的区域
        sed -i.bak "s/^region[[:space:]]*=.*/region = ${REGION}/" .github/config/volc/config

        # 复制配置文件到 ~/.volc/（volc CLI 默认读取位置）
        cp .github/config/volc/credentials .github/config/volc/config ~/.volc/

        # 清理备份文件（可选）
        rm -f .github/config/volc/credentials.bak .github/config/volc/config.bak

        echo "✅ volc CLI configured successfully."